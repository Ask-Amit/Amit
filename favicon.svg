<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="4" fill="#0a1628"/>
  <!-- Paleo Hebrew Aleph — ox head: central diagonal stroke, two horns, two legs -->
  <!-- Main diagonal spine (top-left to bottom-right) -->
  <line x1="8" y1="26" x2="24" y2="6" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
  <!-- Cross-bar in the middle -->
  <line x1="7" y1="14" x2="19" y2="18" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left horn (top-left, sweeping up-left) -->
  <line x1="8" y1="26" x2="5" y2="20" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
  <!-- Right leg (bottom-right, going down) -->
  <line x1="24" y1="6" x2="27" y2="12" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
</svg>
