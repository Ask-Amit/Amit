<title>Amit — Brainstorm Room</title>
<style>
  :root{
    --bg:#0b0c10; --bg2:#12141a; --panel:#171a22; --border:#262a36;
    --gold:#d4af37; --gold-dim:#8a7228;
    --text:#e8e8ec; --text-dim:#9498a3; --text-faint:#5b606e;
    --good:#4caf6d; --warn:#e0a72e; --bad:#d05555;
    --orbit-line: rgba(212,175,55,0.14);
  }
  @font-face{
    font-family:'Fraunces';
    src:local('Georgia');
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:radial-gradient(ellipse at 50% -10%, #1a1d27 0%, var(--bg) 60%);
    color:var(--text); font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;
    min-height:100vh; overflow-x:hidden;
  }
  header{
    text-align:center; padding:36px 20px 10px;
  }
  header h1{
    font-family:Georgia,'Fraunces',serif; font-weight:600; font-size:28px;
    margin:0; letter-spacing:0.3px; color:var(--text);
  }
  header h1 span{color:var(--gold)}
  header p{ color:var(--text-dim); font-size:14px; margin:8px 0 0; max-width:560px; margin-left:auto; margin-right:auto; line-height:1.5 }

  .stage{
    position:relative; width:min(720px, 92vw); aspect-ratio:1/1; margin:20px auto 10px;
  }
  .orbit-ring{
    position:absolute; inset:0; border-radius:50%;
    border:1px dashed var(--orbit-line);
  }
  .orbit-ring.r2{ inset:12%; }

  .center-orb{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:128px; height:128px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #f3dfa0, var(--gold) 55%, var(--gold-dim) 100%);
    box-shadow:0 0 40px 6px rgba(212,175,55,0.35), inset 0 0 24px rgba(0,0,0,0.25);
    display:flex; align-items:center; justify-content:center;
    animation:breathe 4s ease-in-out infinite;
    z-index:5;
  }
  .center-orb .label{
    color:#1a1206; font-weight:700; font-size:16px; letter-spacing:0.5px; font-family:Georgia,serif;
  }
  @keyframes breathe{
    0%,100%{ box-shadow:0 0 40px 6px rgba(212,175,55,0.35), inset 0 0 24px rgba(0,0,0,0.25); }
    50%{ box-shadow:0 0 58px 12px rgba(212,175,55,0.5), inset 0 0 24px rgba(0,0,0,0.25); }
  }

  .participant{
    position:absolute; width:76px; height:76px; border-radius:50%;
    top:50%; left:50%; margin:-38px 0 0 -38px;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:var(--panel); border:2px solid var(--border);
    color:var(--text-dim); font-size:11px; text-align:center; padding:4px;
    cursor:pointer; transition:transform .5s cubic-bezier(.2,.8,.2,1), border-color .5s, box-shadow .5s, background .5s;
    z-index:4;
  }
  .participant .name{ font-weight:600; color:var(--text); font-size:12px; margin-bottom:2px }
  .participant .state{ font-size:9px; letter-spacing:.4px; text-transform:uppercase; color:var(--text-faint) }
  .participant.pending{ animation:pulseWait 1.8s ease-in-out infinite; }
  @keyframes pulseWait{
    0%,100%{ border-color:var(--border); }
    50%{ border-color:var(--gold-dim); }
  }
  .participant.filled{
    border-color:var(--good); background:#152019;
    box-shadow:0 0 18px rgba(76,175,109,0.25);
  }
  .participant.filled .state{ color:var(--good) }
  .participant:hover{ transform:scale(1.08); }

  .connector{
    position:absolute; top:50%; left:50%; height:1px; background:var(--orbit-line);
    transform-origin:0 0; z-index:1;
  }
  .connector.active{ background:linear-gradient(90deg, var(--gold-dim), var(--good)); height:2px; }

  .round-badge{
    text-align:center; color:var(--text-dim); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    margin-top:8px;
  }
  .round-badge b{ color:var(--gold); }

  .panels{
    max-width:760px; margin:26px auto 60px; padding:0 20px;
    display:grid; gap:16px;
  }
  .panel{
    background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:18px 20px;
  }
  .panel h3{ margin:0 0 8px; font-size:13px; color:var(--gold); letter-spacing:.4px; text-transform:uppercase }
  .panel p, .panel div.body{ margin:0; color:var(--text-dim); font-size:14px; line-height:1.6; white-space:pre-wrap }

  #detail{ display:none; }
  #detail.show{ display:block; }
  .detail-source{ color:var(--text); font-weight:600; margin-bottom:6px }

  footer{ text-align:center; color:var(--text-faint); font-size:12px; padding-bottom:40px; }
</style>

<header>
  <h1>Amit <span>— Brainstorm Room</span></h1>
  <p id="topicTitle">Loading the live topic...</p>
</header>

<div class="stage" id="stage">
  <div class="orbit-ring"></div>
  <div class="orbit-ring r2"></div>
  <div class="center-orb"><div class="label">Amit</div></div>
</div>
<div class="round-badge" id="roundBadge">Round <b>1</b> — waiting for responses</div>

<div class="panels">
  <div class="panel">
    <h3>This round's question</h3>
    <div class="body" id="promptText">—</div>
  </div>
  <div class="panel" id="detail">
    <h3>Response</h3>
    <div class="detail-source" id="detailSource"></div>
    <div class="body" id="detailText"></div>
  </div>
</div>

<footer>Every voice shown here becomes part of one consented conclusion. This session is the origin case — shown as it actually happened.</footer>

<script>
const SUPABASE_URL = 'https://hleqtjqojksurvkyqixt.supabase.co';
const SUPABASE_ANON = 'sb_publishable_0pptfPselXI0V9JmnhXgbA_dAGurCiF';
// The real, live topic created during tonight's actual origin session -
// hardcoded here deliberately since this first build IS that event, not a
// generic template yet. A future pass makes this dynamic per-user/topic.
const TOPIC_ID = 'f376af76-cb1d-4dfd-9145-b6b4bf54e299';

async function sb(path) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON }
  });
  return r.json();
}

function placeParticipants(names) {
  const stage = document.getElementById('stage');
  document.querySelectorAll('.participant, .connector').forEach(e => e.remove());
  const n = names.length;
  const radius = stage.clientWidth * 0.42;
  names.forEach((name, i) => {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(angle) * radius, y = Math.sin(angle) * radius;

    const connector = document.createElement('div');
    connector.className = 'connector';
    const len = Math.sqrt(x * x + y * y);
    const deg = Math.atan2(y, x) * 180 / Math.PI;
    connector.style.width = len + 'px';
    connector.style.transform = `rotate(${deg}deg)`;
    connector.dataset.name = name;
    stage.appendChild(connector);

    const el = document.createElement('div');
    el.className = 'participant pending';
    el.dataset.name = name;
    el.style.left = `calc(50% + ${x}px)`;
    el.style.top = `calc(50% + ${y}px)`;
    el.innerHTML = `<div class="name">${name}</div><div class="state">waiting</div>`;
    el.onclick = () => showDetail(name);
    stage.appendChild(el);
  });
}

function fillParticipant(name, text) {
  const el = document.querySelector(`.participant[data-name="${name}"]`);
  const conn = document.querySelector(`.connector[data-name="${name}"]`);
  if (el) { el.classList.remove('pending'); el.classList.add('filled'); el.querySelector('.state').textContent = 'answered'; el.dataset.response = text; }
  if (conn) conn.classList.add('active');
}

function showDetail(name) {
  const el = document.querySelector(`.participant[data-name="${name}"]`);
  const detail = document.getElementById('detail');
  if (!el || !el.dataset.response) {
    detail.classList.remove('show');
    return;
  }
  document.getElementById('detailSource').textContent = name;
  document.getElementById('detailText').textContent = el.dataset.response;
  detail.classList.add('show');
}

async function load() {
  const [topics, rounds] = await Promise.all([
    sb(`amit_brainstorm_topics?id=eq.${TOPIC_ID}&select=title`),
    sb(`amit_brainstorm_rounds?topic_id=eq.${TOPIC_ID}&order=round_number.asc`)
  ]);
  document.getElementById('topicTitle').textContent = topics[0] ? topics[0].title : 'Topic not found';
  if (!rounds.length) return;

  const latestRound = rounds[rounds.length - 1];
  document.getElementById('roundBadge').innerHTML = `Round <b>${latestRound.round_number}</b>`;
  document.getElementById('promptText').textContent = latestRound.prompt_text;

  const responses = await sb(`amit_brainstorm_responses?round_id=eq.${latestRound.id}`);
  const knownSources = ['Amit','Grok','Gemini','Copilot','ChatGPT','Claude','Meta AI','Perplexity'];
  const present = responses.map(r => r.source);
  const names = Array.from(new Set([...present])).length ? Array.from(new Set(present)) : knownSources.slice(0,1);
  // Always show at least the sources that have answered, plus a light
  // scaffold of "expected" seats so the room doesn't look empty before
  // anyone's posted anything back yet.
  const seats = present.length ? present : ['Amit'];
  placeParticipants(seats);
  responses.forEach(r => fillParticipant(r.source, r.response_text));
  if (responses.length) document.getElementById('roundBadge').innerHTML += ` — ${responses.length} response${responses.length===1?'':'s'} in`;
}

load().catch(e => {
  document.getElementById('topicTitle').textContent = 'Could not load live data — check connection.';
  console.error(e);
});
// Auto-refresh so newly-saved responses appear without a manual reload -
// Ryan's own words: "I am ready to copy and paste... let's do it." This
// page should feel alive while he works, not require him to keep hitting
// refresh to see what Amit just saved.
setInterval(() => load().catch(() => {}), 4000);
</script>
