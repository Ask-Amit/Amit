<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Council</title>
<link rel="icon" type="image/png" href="../amit_icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09141f;
  --card-head:#0f2338;
  --border:rgba(201,168,76,0.55);
  --gold:#c9a84c;
  --gold2:#e8c56a;
  --text:#ffffff;
  --text2:#f0e8d0;
  --muted:rgba(240,232,208,0.78);
  --dim:rgba(240,232,208,0.42);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'Crimson Pro',Georgia,serif;color:var(--text);display:flex;flex-direction:column}

body::before{
  content:'';
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:60vmin;height:60vmin;
  background:url('../amit_icon.png') center/contain no-repeat;
  opacity:.035;
  pointer-events:none;
  z-index:0;
}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px;
  background:var(--card-head);
  border-bottom:2px solid var(--border);
  flex-shrink:0;
  position:relative;
}
.page-title-wrap{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;
}
.page-title{
  font-family:Georgia,serif;font-size:26px;font-weight:700;
  letter-spacing:.3px;text-transform:none;color:var(--gold2);
}
.page-version{
  font-family:monospace;font-size:11px;letter-spacing:.05em;
  color:rgba(201,168,76,.55);margin-top:2px;
}
.brand{display:flex;align-items:baseline;gap:14px}
.brand-sub{font-style:italic;color:rgba(240,232,208,.55);font-size:12px}
.hdr-right{text-align:right}
.greeting{font-family:'Cinzel',serif;font-size:16px;color:#fff;font-weight:600}
.datetime{font-size:12px;color:var(--muted);margin-top:2px}
.help-btn{width:22px;height:22px;border-radius:50%;border:1px solid rgba(240,232,208,.3);color:rgba(240,232,208,.6);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .15s}
.help-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── HUB LAYOUT ── */
.hub{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:230px;flex-shrink:0;
  background:var(--card-head);
  border-right:2px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;padding:12px 10px;gap:5px;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}
.sidebar{transition:width .18s ease}
.sidebar.collapsed{width:60px}
.sidebar.collapsed .tile{justify-content:center;padding:10px 0}
.sidebar.collapsed .tile-info{display:none}
.tile{
  display:flex;align-items:center;gap:10px;
  padding:10px 11px;border-radius:9px;cursor:pointer;
  border:1px solid transparent;
  transition:all .18s;user-select:none;
  position:relative;overflow:hidden;
}
.tile:hover{background:rgba(255,255,255,.07);border-color:rgba(201,168,76,.3)}
.tile.active{background:rgba(201,168,76,.16);border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,168,76,.25)}
.tile-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.tile-info{flex:1;min-width:0}
.tile-name{font-family:'Cinzel',serif;font-size:11px;color:#fff;letter-spacing:.04em;font-weight:600}
.tile-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── MAIN AREA ── */
.main-area{flex:1;overflow:hidden;position:relative;background:var(--bg)}
.panel{
  position:absolute;inset:0;overflow-y:auto;
  display:none;flex-direction:column;
  animation:pfade .18s ease;
}
.panel.active{display:flex}
@keyframes pfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.panel::-webkit-scrollbar{width:5px}
.panel::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:3px}

/* ── PANEL HEADER ── */
.panel-head{
  display:flex;align-items:center;gap:16px;
  padding:14px 24px;
  background:var(--card-head);
  border-bottom:2px solid var(--border);
  flex-shrink:0;
}
.panel-heading{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold2);font-weight:700}
.panel-empty{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(240,232,208,.25);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase}

/* ── TABBED LAYOUT (copied structure from Computer Health's folder-tab UI — no data behind it) ── */
.ch-tab-nav{display:flex;align-items:flex-end;gap:6px;margin:0 24px;padding:0;background:var(--bg);flex-shrink:0}
.ch-tab-btn{padding:9px 22px;margin-top:10px;border:1px solid rgba(201,168,76,.25);background:rgba(255,255,255,.03);color:var(--muted);border-radius:10px 10px 0 0;cursor:pointer;font-size:13px;font-family:inherit}
.ch-tab-btn.active{padding:12px 26px;margin-top:-2px;margin-bottom:-3px;border-bottom:none;background:var(--card-head);color:var(--gold2);font-weight:600;font-size:14px;position:relative;z-index:2}
.ch-tab-main{flex:1;min-height:0;overflow-y:auto;padding:28px 32px;margin:0 24px 24px;background:var(--card-head);border:1px solid rgba(201,168,76,.25);border-radius:0 12px 12px 12px}
.ch-tab-content{display:none}
.ch-tab-content.active{display:block}
</style>
</head>
<body>

<header>
  <div class="page-title-wrap">
    <div class="page-title" id="pageTitle">Council</div>
    <div class="page-version" id="pageVersion">v4.43</div>
  </div>
  <div class="brand">
    <img src="../amit_icon.png" alt="Amit" style="height:32px;width:32px">
    <span class="brand-sub">Walk alongside. Sharpen without cutting. Encourage always.</span>
  </div>
  <div class="hdr-right" style="display:flex;align-items:center;gap:14px">
    <div style="text-align:right">
      <div class="greeting" id="greeting">Good morning</div>
      <div class="datetime" id="datetime"></div>
      <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:3px">
        <div id="syncIndicator" onclick="openSyncModal()" style="font-size:9px;letter-spacing:.07em;color:rgba(240,232,208,.28);cursor:pointer;font-family:'Cinzel',serif">☁ SYNC</div>
        <div id="signInBtn" onclick="openSyncModal()" title="Sign in to sync your data" style="font-size:9px;letter-spacing:.1em;color:rgba(201,168,76,.8);cursor:pointer;font-family:'Cinzel',serif;border:1px solid rgba(201,168,76,.3);padding:3px 9px;border-radius:4px;background:rgba(201,168,76,.07)">SIGN IN</div>
        <div id="logoutBtn" onclick="signOutAmit()" title="Sign out" style="display:none;font-size:10px;letter-spacing:.08em;color:rgba(201,168,76,.9);cursor:pointer;font-family:'Cinzel',serif;font-weight:600;border-left:1px solid rgba(240,232,208,.2);padding-left:8px">SIGN OUT</div>
      </div>
    </div>
    <div class="help-btn">?</div>
  </div>
</header>

<div class="hub">

  <!-- ── SIDEBAR — PLACEHOLDER TILES (1-20) ── -->
  <nav class="sidebar" id="sidebarTiles" ondblclick="toggleSidebar()"></nav>

  <!-- ── MAIN CONTENT AREA — PLACEHOLDER PANELS (1-20) ── -->
  <div class="main-area" id="mainArea"></div>

</div>

<!-- SYNC / SIGN-IN MODAL -->
<div id="syncModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center">
  <div class="sync-modal-card" style="background:#1a3352;border:1px solid rgba(201,168,76,.45);border-radius:14px;padding:36px 40px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5)">
    <div style="color:rgba(201,168,76,.9);font-family:'Cinzel',serif;font-size:16px;letter-spacing:.06em;margin-bottom:6px">Sync Across Devices</div>
    <div style="color:rgba(240,232,208,.5);font-size:11px;line-height:1.7;margin-bottom:22px">Enter your email. A sign-in link will be sent.<br>No password needed.</div>
    <input id="syncEmailInput" type="email" placeholder="your@email.com"
      style="width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:11px 13px;color:#fff;font-size:13px;outline:none;margin-bottom:12px;font-family:inherit"
      onkeydown="if(event.key==='Enter')submitSyncEmail()"/>
    <button id="syncSubmitBtn" onclick="submitSyncEmail()"
      style="width:100%;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.45);color:rgba(201,168,76,.9);padding:11px;border-radius:7px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em">
      SEND SIGN-IN LINK →
    </button>
    <div onclick="closeSyncModal()" style="margin-top:16px;font-size:9px;color:rgba(240,232,208,.25);cursor:pointer;letter-spacing:.1em">CANCEL</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// TEMPLATE — blank layout shell. No data model, no per-project logic.
// Placeholder tiles/panels 1-20: rename, re-icon, and build real content
// into each panel when this template is copied for a new project.
// ══════════════════════════════════════════════

const PLACEHOLDER_COUNT=20;
(function buildPlaceholders(){
  const nav=document.getElementById('sidebarTiles');
  const main=document.getElementById('mainArea');
  let navHtml='',panelHtml='';
  for(let i=1;i<=PLACEHOLDER_COUNT;i++){
    const label=i===1?'Introduction':i===2?'Tabbed Layout':'Placeholder '+i;
    navHtml+=`<div class="tile${i===1?' active':''}" id="tile-${i}" onclick="openPanel(${i})">
      <div class="tile-icon">▢</div>
      <div class="tile-info">
        <div class="tile-name">${label}</div>
        <div class="tile-sub">—</div>
      </div>
    </div>`;
    if(i===1||i===2){
      let tabNavHtml='',tabContentHtml='';
      for(let t=1;t<=5;t++){
        const tabLabel=(i===2&&t===1)?'Scope':'Tab '+t;
        tabNavHtml+=`<button class="ch-tab-btn${t===1?' active':''}" onclick="showChTab(${i},${t})">${tabLabel}</button>`;
        // Session 1 (panel 2), Tab 1: the real entry point - what the user
        // is actually asking the Council to convene on. Ryan's direct
        // instruction, 2026-07-22.
        const body=(i===2&&t===1)
          ? `<div style="max-width:640px">
              <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px">
                <div style="font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);white-space:nowrap">Title</div>
                <input id="councilTitleText" type="text" maxlength="20" placeholder="e.g. Budget Fix" oninput="updateCouncilPageTitle(2,this.value)" tabindex="1" style="flex:0 0 auto;width:22ch;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit">
                <div style="color:var(--muted);font-size:12px;white-space:nowrap">Max. 20</div>
              </div>

              <div style="font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);margin:20px 0 6px">What is the request of the Council?</div>
              <div style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:16px">Write out the real problem you want the Council to work on — as much detail as it takes. This becomes the question the Council convenes around.</div>
              <textarea id="councilRequestText" placeholder="What are you actually trying to figure out? Bring the real problem, with all its real constraints..." tabindex="2" style="width:100%;min-height:160px;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);color:var(--text);border-radius:8px;padding:14px;font-size:14px;line-height:1.6;font-family:inherit;resize:vertical"></textarea>

              <button id="councilRequestBtn" type="button" tabindex="3" onclick="conveneCouncil()" style="margin-top:16px;background:var(--gold);color:#1a1206;border:none;padding:11px 22px;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer;display:block">Convene the Council</button>
              <div id="conveneStatus" style="margin-top:10px;font-size:13px;color:var(--muted)"></div>
            </div>`
          : `Tab ${t} content goes here`;
        tabContentHtml+=`<div class="ch-tab-content${t===1?' active':''}" id="ch-tab-${i}-${t}">${body}</div>`;
      }
      panelHtml+=`<div class="panel${i===1?' active':''}" id="panel-${i}" style="flex-direction:column">
        <div class="panel-head"><span class="panel-heading">${label}</span></div>
        <div class="ch-tab-nav" id="ch-tab-nav-${i}">${tabNavHtml}</div>
        <div class="ch-tab-main">${tabContentHtml}</div>
      </div>`;
    } else {
      panelHtml+=`<div class="panel${i===1?' active':''}" id="panel-${i}">
        <div class="panel-head"><span class="panel-heading">${label}</span></div>
        <div class="panel-empty">Panel ${i} content goes here</div>
      </div>`;
    }
  }
  nav.innerHTML=navHtml;
  main.innerHTML=panelHtml;
})();

// Tabbed-layout behavior (copied from Computer Health's showTab — folder-tab
// look, sub-content switching within one panel — no data hooks attached).
function showChTab(panelNum,n){
  const panel=document.getElementById('panel-'+panelNum);
  panel.querySelectorAll('.ch-tab-content').forEach(c=>c.classList.remove('active'));
  panel.querySelectorAll('.ch-tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ch-tab-'+panelNum+'-'+n).classList.add('active');
  event.target.classList.add('active');
}

function openPanel(n){
  document.querySelectorAll('.tile').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const tile=document.getElementById('tile-'+n);
  const panel=document.getElementById('panel-'+n);
  if(tile)tile.classList.add('active');
  if(panel)panel.classList.add('active');
}

// Ryan's direct instruction, 2026-07-22: the Council Title field on Page
// 2's Scope tab (max 20 chars) becomes that page's actual title - the
// sidebar tile name and the panel's own heading, live as it's typed.
// Reactive UI only right now, no persistence yet.
function updateCouncilPageTitle(pageNum,value){
  const display=value.trim()||'Session 1';
  const tileName=document.querySelector('#tile-'+pageNum+' .tile-name');
  const panelHeading=document.querySelector('#panel-'+pageNum+' .panel-heading');
  if(tileName)tileName.textContent=display;
  if(panelHeading)panelHeading.textContent=display;
}

// Ryan's direct instruction, 2026-07-22: Convene writes for real, straight
// into the existing council_ schema (council_topics + council_rounds) -
// same tables Amit_Council2.html already uses. Round 1 always starts in
// the Clarification phase, per the standing procedure. Picking the actual
// AI roster and writing the real investigation prompt is Amit's own live
// judgment call in conversation, not something this static page computes -
// this just gets the topic and Round 1 correctly saved so that work has
// somewhere real to attach to.
async function conveneCouncil(){
  const statusEl=document.getElementById('conveneStatus');
  if(!currentUser){statusEl.textContent='Sign in first.';statusEl.style.color='#e08a8a';return;}
  const title=document.getElementById('councilTitleText').value.trim();
  const request=document.getElementById('councilRequestText').value.trim();
  if(!title){statusEl.textContent='Give it a title first.';statusEl.style.color='#e08a8a';return;}
  if(!request){statusEl.textContent='Write the actual request first.';statusEl.style.color='#e08a8a';return;}
  const btn=document.getElementById('councilRequestBtn');
  btn.disabled=true;btn.textContent='Convening...';
  statusEl.textContent='';
  try{
    const{data:topic,error:topicErr}=await db.from('council_topics').insert({
      user_id:currentUser.id, title:title, original_question:request
    }).select().single();
    if(topicErr)throw topicErr;
    const{error:roundErr}=await db.from('council_rounds').insert({
      topic_id:topic.id, round_number:1, prompt_text:request, phase:'clarification'
    });
    if(roundErr)throw roundErr;
    updateCouncilPageTitle(2,title);
    statusEl.textContent='Saved — topic and Round 1 created in the database.';
    statusEl.style.color='rgba(120,200,150,.9)';
  }catch(e){
    console.error(e);
    statusEl.textContent='Could not save — '+(e.message||'check console')+(e.message&&e.message.includes('row-level security')?' (this account may need premium access)':'');
    statusEl.style.color='#e08a8a';
  }finally{
    btn.disabled=false;btn.textContent='Convene the Council';
  }
}

// Double-click anywhere in the sidebar collapses it to icon-only, or
// expands it back to the full labeled row. Double-click again to reverse.
function toggleSidebar(){
  document.getElementById('sidebarTiles').classList.toggle('collapsed');
}

// ══════════════════════════════════════════════
// LOGIN CONNECTION — the one live piece of this template.
// Supabase auth only: knows who is signed in. No data reads/writes beyond that.
// ══════════════════════════════════════════════
const SB_URL='https://hleqtjqojksurvkyqixt.supabase.co';
const SB_KEY='sb_publishable_0pptfPselXI0V9JmnhXgbA_dAGurCiF';
const db=(typeof supabase!=='undefined')?supabase.createClient(SB_URL,SB_KEY):null;
let currentUser=null;

if(db){
  db.auth.onAuthStateChange((event,session)=>{
    currentUser=session?session.user:null;
    _updateSyncUI();
  });
}

function _updateSyncUI(){
  const el=document.getElementById('syncIndicator');if(!el)return;
  const logoutBtn=document.getElementById('logoutBtn');
  const signInBtn=document.getElementById('signInBtn');
  if(currentUser){
    el.textContent='● SYNCED';el.style.color='rgba(100,220,160,.7)';el.title='Signed in · '+currentUser.email;
    if(logoutBtn)logoutBtn.style.display='block';
    if(signInBtn)signInBtn.style.display='none';
  } else {
    el.textContent='';el.style.color='rgba(240,232,208,.28)';el.title='';
    if(logoutBtn)logoutBtn.style.display='none';
    if(signInBtn)signInBtn.style.display='block';
  }
}

async function signOutAmit(){
  if(!db)return;
  await db.auth.signOut();
  currentUser=null;
  _updateSyncUI();
}

async function sendMagicLink(email){
  if(!db)return'Database not available';
  const{error}=await db.auth.signInWithOtp({email});
  return error?error.message:null;
}

function openSyncModal(){
  if(currentUser){if(confirm('Signed in as '+currentUser.email+'\n\nSign out?'))signOutAmit();return;}
  const m=document.getElementById('syncModal');if(!m)return;
  m.style.display='flex';
}
function closeSyncModal(){const m=document.getElementById('syncModal');if(m)m.style.display='none';}
async function submitSyncEmail(){
  const email=document.getElementById('syncEmailInput').value.trim();if(!email)return;
  const btn=document.getElementById('syncSubmitBtn');btn.textContent='Sending…';btn.disabled=true;
  const err=await sendMagicLink(email);
  if(err){btn.textContent='Try again';btn.disabled=false;}
  else{
    document.querySelector('#syncModal .sync-modal-card').innerHTML=`
      <div style="color:rgba(201,168,76,.9);font-family:'Cinzel',serif;font-size:17px;margin-bottom:14px">Link sent</div>
      <div style="color:rgba(240,232,208,.7);font-size:13px;line-height:1.7">Check your email.<br>Click the link to sign in.</div>
      <div onclick="closeSyncModal()" style="margin-top:20px;font-size:10px;color:rgba(240,232,208,.35);cursor:pointer;letter-spacing:.08em">CLOSE</div>`;
  }
}

// ══════════════════════════════════════════════
// CLOCK / GREETING — visual only, no data behind it
// ══════════════════════════════════════════════
function updateClock(){
  const d=new Date();
  const h=d.getHours();
  const sal=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  const g=document.getElementById('greeting');if(g)g.textContent=sal;
  const dt=document.getElementById('datetime');
  if(dt)dt.textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
updateClock();
setInterval(updateClock,30000);
</script>

</body>
</html>
