<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Council</title>
<link rel="icon" type="image/png" href="../amit_icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09141f;
  --card-head:#0f2338;
  --border:rgba(201,168,76,0.55);
  --gold:#c9a84c;
  --gold2:#e8c56a;
  --text:#ffffff;
  --text2:#f0e8d0;
  --muted:rgba(240,232,208,0.78);
  --dim:rgba(240,232,208,0.42);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'Crimson Pro',Georgia,serif;color:var(--text);display:flex;flex-direction:column}

body::before{
  content:'';
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:60vmin;height:60vmin;
  background:url('../amit_icon.png') center/contain no-repeat;
  opacity:.035;
  pointer-events:none;
  z-index:0;
}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px;
  background:var(--card-head);
  border-bottom:2px solid var(--border);
  flex-shrink:0;
  position:relative;
}
.page-title-wrap{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;
}
.page-title{
  font-family:Georgia,serif;font-size:26px;font-weight:700;
  letter-spacing:.3px;text-transform:none;color:var(--gold2);
}
.page-version{
  font-family:monospace;font-size:11px;letter-spacing:.05em;
  color:rgba(201,168,76,.55);margin-top:2px;
}
.brand{display:flex;align-items:baseline;gap:14px}
.brand-sub{font-style:italic;color:rgba(240,232,208,.55);font-size:12px}
.hdr-right{text-align:right}
.greeting{font-family:'Cinzel',serif;font-size:16px;color:#fff;font-weight:600}
.datetime{font-size:12px;color:var(--muted);margin-top:2px}
.help-btn{width:22px;height:22px;border-radius:50%;border:1px solid rgba(240,232,208,.3);color:rgba(240,232,208,.6);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .15s}
.help-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── HUB LAYOUT ── */
.hub{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:230px;flex-shrink:0;
  background:var(--card-head);
  border-right:2px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;padding:12px 10px;gap:5px;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}
.sidebar{transition:width .18s ease}
.sidebar.collapsed{width:60px}
.sidebar.collapsed .tile{justify-content:center;padding:10px 0}
.sidebar.collapsed .tile-info{display:none}
.tile{
  display:flex;align-items:center;gap:10px;
  padding:10px 11px;border-radius:9px;cursor:pointer;
  border:1px solid transparent;
  transition:all .18s;user-select:none;
  position:relative;overflow:hidden;
}
.tile:hover{background:rgba(255,255,255,.07);border-color:rgba(201,168,76,.3)}
.tile.active{background:rgba(201,168,76,.16);border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,168,76,.25)}
.tile-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.tile-info{flex:1;min-width:0}
.tile-name{font-family:'Cinzel',serif;font-size:11px;color:#fff;letter-spacing:.04em;font-weight:600}
.tile-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── MAIN AREA ── */
.main-area{flex:1;overflow:hidden;position:relative;background:var(--bg)}
.panel{
  position:absolute;inset:0;overflow-y:auto;
  display:none;flex-direction:column;
  animation:pfade .18s ease;
}
.panel.active{display:flex}
@keyframes pfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.panel::-webkit-scrollbar{width:5px}
.panel::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:3px}

/* ── PANEL HEADER ── */
.panel-head{
  display:flex;align-items:center;gap:16px;
  padding:14px 24px;
  background:var(--card-head);
  border-bottom:2px solid var(--border);
  flex-shrink:0;
}
.panel-heading{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold2);font-weight:700}
.panel-empty{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(240,232,208,.25);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase}

/* ── TABBED LAYOUT (copied structure from Computer Health's folder-tab UI — no data behind it) ── */
.ch-tab-nav{display:flex;align-items:flex-end;gap:6px;margin:18px 24px 0;padding:0;background:var(--bg);flex-shrink:0}
.ch-tab-btn{padding:9px 22px;margin-top:10px;border:1px solid rgba(201,168,76,.25);background:rgba(255,255,255,.03);color:var(--muted);border-radius:10px 10px 0 0;cursor:pointer;font-size:13px;font-family:inherit}
.ch-tab-btn.active{padding:12px 26px;margin-top:-2px;margin-bottom:-3px;border-bottom:none;background:var(--card-head);color:var(--gold2);font-weight:600;font-size:14px;position:relative;z-index:2}
.ch-tab-main{flex:1;min-height:0;overflow-y:auto;padding:28px 32px;margin:0 24px 24px;background:var(--card-head);border:1px solid rgba(201,168,76,.25);border-radius:0 12px 12px 12px}
.ch-tab-content{display:none}
/* Fix, 2026-07-22: an inline display:flex style on Scope's and each round's
   content div was overriding the class-based show/hide entirely (inline
   style beats a stylesheet class), so switching tabs only toggled a class
   while both boxes stayed visibly stacked underneath each other. This
   class-based variant fixes it - the JS toggle now only ever uses classes. */
.ch-tab-content.active.twoBox{display:flex;height:100%}
.ch-tab-content.active{display:block}

/* Diary structure: header flush left with an underline, body indented
   beneath it - consistent for every section (Original Question, Current
   Solution, each Round entry). Ryan's direct instruction, 2026-07-22. */
#diaryText[contenteditable]:empty:before{content:attr(data-placeholder);color:rgba(240,232,208,.35)}
.diaryHeader{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);border-bottom:1px solid rgba(201,168,76,.35);padding-bottom:4px;margin:16px 0 8px}
.diaryHeader:first-child{margin-top:0}
.diaryBody{margin-left:18px;margin-bottom:4px;white-space:pre-wrap}

/* THE COUNCIL WHEEL — carried forward from the original Still Water build
   (Amit_Council2.html), scaled down and reused on the Ruling side of every
   round: as each voice's answer is saved, its light on the rim comes alive;
   double-click any light to read that voice's full answer. Ryan's direct
   instruction, 2026-07-22: import the graphic itself into each round's
   Ruling box, one live wheel per round. The full wave-interference canvas
   from the original is not reproduced here (too heavy to run one instance
   per round simultaneously) - the corona, rim lights, and center mark are,
   which is the actual visual identity people recognize. */
.cw-wheel-host{display:flex;flex-direction:column;align-items:center;width:100%;height:100%}
.council-wheel{position:relative;flex-shrink:0}
.council-wheel .cw-basin{position:absolute;inset:0;border-radius:50%;background:#000;box-shadow:0 0 30px 6px rgba(0,0,0,.6),inset 0 0 24px rgba(0,0,0,.8)}
.council-wheel .cw-rim{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(212,175,55,.18);pointer-events:none}
.council-wheel .cw-corona{position:absolute;top:50%;left:50%;width:32%;height:32%;transform:translate(-50%,-50%);border-radius:50%;background:repeating-conic-gradient(from 0deg,rgba(243,223,160,.9) 0deg 3deg,rgba(212,175,55,.5) 3deg 6deg,rgba(212,175,55,0) 6deg 16deg);filter:blur(1px);animation:cwSpin 50s linear infinite;z-index:6;pointer-events:none;-webkit-mask-image:radial-gradient(circle,transparent 27%,black 30%,black 92%,transparent 100%);mask-image:radial-gradient(circle,transparent 27%,black 30%,black 92%,transparent 100%)}
.council-wheel .cw-corona.converged{animation-duration:14s}
@keyframes cwSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.council-wheel .cw-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:15%;height:15%;border-radius:50%;background:#000;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;z-index:7;pointer-events:none;filter:drop-shadow(0 0 6px rgba(212,175,55,.25));transition:filter .4s;overflow:hidden}
.council-wheel .cw-center.answered{filter:drop-shadow(0 0 16px rgba(212,175,55,.9))}
.council-wheel .cw-center img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.council-wheel .cw-center svg{width:22%;height:38%}
.council-wheel .cw-center path{fill:var(--gold);stroke:none}
.council-wheel .cw-center circle{fill:var(--gold);stroke:none}
.council-wheel .cw-center .cw-stem{fill:none;stroke:var(--gold);stroke-width:4;stroke-linecap:round}
/* One circle per voice, carrying the sequence number itself - no separate
   shadow dot behind it. Ryan's direct instruction, 2026-07-22. */
.council-wheel .cw-voice{position:absolute;width:28px;height:28px;margin:-14px 0 0 -14px;border-radius:50%;cursor:pointer;transition:transform .3s;z-index:8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:rgba(240,232,208,.9);background:rgba(180,180,190,.55);border:1px solid rgba(240,232,208,.35)}
.council-wheel .cw-voice.answered{color:#11161f;border-color:transparent;box-shadow:0 0 10px 3px var(--cw-glow,rgba(212,175,55,.6))}
.council-wheel .cw-voice .cw-name{position:absolute;top:32px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.council-wheel .cw-voice:hover{transform:scale(1.4)}
/* "Something landed" ripple - fires once per newly-saved answer, restored
   from the original Still Water build. Ryan's direct instruction, 2026-07-22. */
.council-wheel .cw-landing{position:absolute;border-radius:50%;border:2px solid;pointer-events:none;z-index:9;transform:translate(-50%,-50%);animation:cwLand 1.1s ease-out forwards}
.council-wheel .cw-landing-center{animation-duration:1.4s}
@keyframes cwLand{0%{width:16px;height:16px;opacity:.95}100%{width:110px;height:110px;opacity:0}}
.council-wheel .cw-status{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;flex-shrink:0}
#cwDetailModal,#amitConfirmModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
#cwDetailModal.show,#amitConfirmModal.show{display:flex}
#cwDetailModal .cw-modal-box,#amitConfirmModal .cw-modal-box{background:#11161f;border:1px solid rgba(201,168,76,.4);border-radius:12px;max-width:560px;width:90%;max-height:76vh;display:flex;flex-direction:column;padding:22px;box-shadow:0 12px 48px rgba(0,0,0,.6)}
#cwDetailModal h3{font-family:'Cinzel',serif;color:var(--gold2);margin:0 0 12px}
#cwDetailModal .cw-modal-body{flex:1;overflow-y:auto;white-space:pre-wrap;font-size:13px;line-height:1.6;color:var(--text);font-family:'Crimson Pro',Georgia,serif}
#cwDetailModal button{margin-top:16px;align-self:flex-end;background:var(--gold);color:#1a1206;border:none;padding:8px 16px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
#amitConfirmModal button{background:var(--gold);color:#1a1206;border:none;padding:8px 16px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
#councilTitleText:focus{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(201,168,76,.25)}

/* STANDING RULE — "needs input" - any field on the Petition side of any
   box, on any page/tab, that is the very next thing the user needs to act
   on gets this blinking gold border. Ryan's direct instruction, 2026-07-22:
   this is a standard for the whole Council, not a one-off - whatever field
   is next always blinks, and is auto-scrolled to the vertical center of
   its Petition box, so the user is never left hunting for what's next. */
.needs-input{animation:needsInputBlink 1.4s ease-in-out infinite;border-color:var(--gold2)!important}
@keyframes needsInputBlink{
  0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.55);border-color:var(--gold2)}
  50%{box-shadow:0 0 0 4px rgba(201,168,76,0);border-color:rgba(201,168,76,.5)}
}
</style>
</head>
<body>

<header>
  <div class="page-title-wrap">
    <div class="page-title" id="pageTitle">Council</div>
    <div class="page-version" id="pageVersion">v4.85</div>
  </div>
  <div class="brand">
    <img src="../amit_icon.png" alt="Amit" style="height:32px;width:32px">
    <span class="brand-sub">Walk alongside. Sharpen without cutting. Encourage always.</span>
  </div>
  <div class="hdr-right" style="display:flex;align-items:center;gap:14px">
    <div style="text-align:right">
      <div class="greeting" id="greeting">Good morning</div>
      <div class="datetime" id="datetime"></div>
      <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:3px">
        <div id="syncIndicator" onclick="openSyncModal()" style="font-size:9px;letter-spacing:.07em;color:rgba(240,232,208,.28);cursor:pointer;font-family:'Cinzel',serif">☁ SYNC</div>
        <div id="signInBtn" onclick="openSyncModal()" title="Sign in to sync your data" style="font-size:9px;letter-spacing:.1em;color:rgba(201,168,76,.8);cursor:pointer;font-family:'Cinzel',serif;border:1px solid rgba(201,168,76,.3);padding:3px 9px;border-radius:4px;background:rgba(201,168,76,.07)">SIGN IN</div>
        <div id="logoutBtn" onclick="signOutAmit()" title="Sign out" style="display:none;font-size:10px;letter-spacing:.08em;color:rgba(201,168,76,.9);cursor:pointer;font-family:'Cinzel',serif;font-weight:600;border-left:1px solid rgba(240,232,208,.2);padding-left:8px">SIGN OUT</div>
      </div>
    </div>
  </div>
</header>

<div class="hub">

  <!-- ── SIDEBAR — PLACEHOLDER TILES (1-20) ── -->
  <nav class="sidebar" id="sidebarTiles" ondblclick="toggleSidebar()"></nav>

  <!-- ── MAIN CONTENT AREA — PLACEHOLDER PANELS (1-20) ── -->
  <div class="main-area" id="mainArea"></div>

</div>

<!-- SYNC / SIGN-IN MODAL -->
<div id="syncModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center">
  <div class="sync-modal-card" style="background:#1a3352;border:1px solid rgba(201,168,76,.45);border-radius:14px;padding:36px 40px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5)">
    <div style="color:rgba(201,168,76,.9);font-family:'Cinzel',serif;font-size:16px;letter-spacing:.06em;margin-bottom:6px">Sync Across Devices</div>
    <div style="color:rgba(240,232,208,.5);font-size:11px;line-height:1.7;margin-bottom:22px">Enter your email. A sign-in link will be sent.<br>No password needed.</div>
    <input id="syncEmailInput" type="email" placeholder="your@email.com"
      style="width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:11px 13px;color:#fff;font-size:13px;outline:none;margin-bottom:12px;font-family:inherit"
      onkeydown="if(event.key==='Enter')submitSyncEmail()"/>
    <button id="syncSubmitBtn" onclick="submitSyncEmail()"
      style="width:100%;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.45);color:rgba(201,168,76,.9);padding:11px;border-radius:7px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em">
      SEND SIGN-IN LINK →
    </button>
    <div onclick="closeSyncModal()" style="margin-top:16px;font-size:9px;color:rgba(240,232,208,.25);cursor:pointer;letter-spacing:.1em">CANCEL</div>
  </div>
</div>

<!-- COUNCIL WHEEL DETAIL MODAL — shared by every round's wheel; double-
     clicking a rim light opens that voice's exact saved answer here. -->
<div id="cwDetailModal">
  <div class="cw-modal-box">
    <h3 id="cwDetailName">—</h3>
    <div class="cw-modal-body" id="cwDetailBody"></div>
    <button type="button" onclick="document.getElementById('cwDetailModal').classList.remove('show')">Close</button>
  </div>
</div>

<!-- AMIT CONFIRM MODAL — replaces the native browser confirm() dialog
     (which hardcodes "ask-amit.github.io says" and can't be relabeled or
     restyled by any HTML/CSS) with an actual Amit-branded prompt. Ryan's
     direct instruction, 2026-07-22. -->
<div id="amitConfirmModal">
  <div class="cw-modal-box" style="max-width:420px">
    <h3>Amit</h3>
    <div class="cw-modal-body" id="amitConfirmBody" style="flex:none"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
      <button type="button" id="amitConfirmCancelBtn" style="background:transparent;color:var(--muted);border:1px solid rgba(240,232,208,.25)">Cancel</button>
      <button type="button" id="amitConfirmOkBtn">OK</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// TEMPLATE — blank layout shell. No data model, no per-project logic.
// Placeholder tiles/panels 1-20: rename, re-icon, and build real content
// into each panel when this template is copied for a new project.
// ══════════════════════════════════════════════

// Only two static pages now: Introduction and Current Council. Everything
// from the third tile down is a real, database-driven session list - built
// by loadCouncilSessions() below, not generated as generic placeholders.
// Ryan's direct instruction, 2026-07-22.
(function buildStaticPages(){
  const nav=document.getElementById('sidebarTiles');
  const main=document.getElementById('mainArea');
  let navHtml='',panelHtml='';
  for(let i=1;i<=2;i++){
    const label=i===1?'Introduction':'Current Council';
    navHtml+=`<div class="tile${i===1?' active':''}" id="tile-${i}" onclick="openPanel(${i})">
      <div class="tile-icon">▢</div>
      <div class="tile-info">
        <div class="tile-name">${label}</div>
        <div class="tile-sub">—</div>
      </div>
    </div>`;
    let tabNavHtml='',tabContentHtml='';
    if(i===1){
      // Introduction stays the fixed 5-tab generic shell for now - untouched.
      for(let t=1;t<=5;t++){
        tabNavHtml+=`<button class="ch-tab-btn${t===1?' active':''}" data-tabkey="${t}" onclick="showChTab(1,'${t}')">Tab ${t}</button>`;
        tabContentHtml+=`<div class="ch-tab-content${t===1?' active':''}" id="ch-tab-1-${t}">Tab ${t} content goes here</div>`;
      }
    } else {
      // Page 2 ("Current Council"): only Scope is static. Round tabs
      // (Round 1, Round 2, ...) are built dynamically by renderRoundTabs()
      // to match however many rounds actually exist for the active
      // session - never a fixed count. Ryan's direct instruction, 2026-07-22.
      tabNavHtml=`<button class="ch-tab-btn active" data-tabkey="scope" onclick="showChTab(2,'scope')">Scope</button><span id="roundTabNavSlot"></span>`;
      tabContentHtml=`<div class="ch-tab-content active twoBox" id="ch-tab-2-scope" style="gap:20px">
        <div style="flex:1;min-width:0;border:1px solid rgba(201,168,76,.35);border-radius:10px;padding:20px 0 20px 20px;display:flex;flex-direction:column;overflow:hidden">
          <div style="font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;flex-shrink:0;padding-right:20px">Petition</div>
          <div style="flex:1;overflow-y:auto;min-height:0;padding-right:20px">
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px">
              <div style="font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);white-space:nowrap">Title</div>
              <input id="councilTitleText" type="text" maxlength="20" placeholder="e.g. Budget Fix" tabindex="1" oninput="updateCouncilPageTitle(2,this.value);if(this.value.trim())markNeedsInput(document.getElementById('councilRequestText'))" onblur="renameSession()" style="flex:0 0 auto;width:22ch;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;caret-color:var(--gold2)">
              <div style="color:var(--muted);font-size:12px;white-space:nowrap">Max. 20</div>
              <button id="newCouncilRequestBtn" type="button" onclick="startNewCouncilRequest()" style="margin-left:auto;background:transparent;color:var(--gold2);border:1px solid rgba(201,168,76,.45);padding:8px 14px;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap">New Council Request</button>
            </div>

            <div id="requestHeading" style="font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);margin:20px 0 6px">What is the request of the Council?</div>
            <div id="requestSubtext" style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:16px">Write out the real problem you want the Council to work on — as much detail as it takes. This becomes the question the Council convenes around.</div>
            <textarea id="councilRequestText" placeholder="What are you actually trying to figure out? Bring the real problem, with all its real constraints..." tabindex="2" oninput="autoGrowTextarea(this)" style="width:100%;height:44px;min-height:44px;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);color:var(--text);border-radius:8px;padding:14px;font-size:14px;line-height:1.6;font-family:inherit;resize:vertical"></textarea>

            <button id="councilRequestBtn" type="button" tabindex="3" onclick="conveneCouncil()" style="margin-top:16px;background:var(--gold);color:#1a1206;border:none;padding:11px 22px;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer;display:block">Submit Request</button>
            <div id="conveneStatus" style="margin-top:10px;font-size:13px;color:var(--muted)"></div>

            <!-- Identifying the council (roster) and the actual question

// active first (last_activity_at desc). Clicking one loads it into Page 2
// and bumps it back to the top. Ryan's direct instruction, 2026-07-22.

let councilSessions=[];
let activeSessionId=null;
const PROVIDER_URLS={
  // 'Amit' has no external site to open - it's not a copy-paste voice, it's

async function loadCouncilSessions(){
  if(!currentUser)return;
  const{data,error}=await db.from('council_topics')
    .select('id,title,original_question,last_activity_at,diary_text')
    .eq('user_id',currentUser.id)
    .order('last_activity_at',{ascending:false});
  if(error){console.error(error);return;}
  councilSessions=data||[];
  renderSessionTiles();
  // Default: nothing explicitly selected yet and sessions exist - load the
  // most recent one into Page 2, per "Page 2 shows Page 3's session by
  // default."
  if(!activeSessionId&&councilSessions.length){
    await loadSessionIntoWorkspace(councilSessions[0],false);
  }
}

function renderSessionTiles(){
  const nav=document.getElementById('sidebarTiles');
  nav.querySelectorAll('.session-tile').forEach(el=>el.remove());
  const frag=document.createDocumentFragment();
  // Fix, 2026-07-22: activeSessionId means "loaded into Page 2's workspace,
  // ready to view" - it does NOT mean "currently being looked at." A
  // session tile must only highlight when the user is actually viewing
  // Current Council, never while they're still on Introduction just
  // because a session was pre-loaded in the background.
  const panel2=document.getElementById('panel-2');
  const viewingCurrentCouncil=panel2&&panel2.classList.contains('active');
  councilSessions.forEach((s,idx)=>{
    const pageNum=idx+3;
    const d=new Date(s.last_activity_at);
    const dateStr=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const el=document.createElement('div');
    el.className='tile session-tile'+((viewingCurrentCouncil&&s.id===activeSessionId)?' active':'');
    el.id='session-tile-'+s.id;
    el.onclick=()=>selectCouncilSession(s.id);
    el.innerHTML=`<div class="tile-icon">▢</div>
      <div class="tile-info">
        <div class="tile-name">${s.title}</div>
        <div class="tile-sub">${dateStr}</div>
      </div>`;
    frag.appendChild(el);
  });
  nav.appendChild(frag);
}

async function selectCouncilSession(topicId){
  const session=councilSessions.find(s=>s.id===topicId);
  if(!session)return;
  // Reviewing it counts as activity - bump it to the top with a fresh date.
  const now=new Date().toISOString();
  await db.from('council_topics').update({last_activity_at:now}).eq('id',topicId);
  session.last_activity_at=now;
  // Fix, 2026-07-22: this was NOT awaited, a real race condition - the
  // panel switch inside loadSessionIntoWorkspace could fire unpredictably
  // late (or effectively never, if anything inside threw), leaving
  // Introduction showing as active while a session tile also looked
  // selected. Now awaited, and openPanel(2) called directly here too as a
  // guarantee the switch always happens regardless of what's inside.
  await loadSessionIntoWorkspace(session,true);
  openPanel(2);
  await loadCouncilSessions();
}

async function loadSessionIntoWorkspace(session,switchView){
  activeSessionId=session.id;
  resetVoiceTabs();
  wheelAnsweredCache={};
  document.getElementById('councilTitleText').value=session.title||'';
  updateCouncilPageTitle(2,session.title||'');
  document.getElementById('councilRequestText').value=session.original_question||'';
  autoGrowTextarea(document.getElementById('councilRequestText'));
  // Ryan's direct instruction, 2026-07-22: an existing session doesn't ask
  // "what's the request" as if it's new - it states who requested it and
  // just displays what was actually asked, no submission prompt.
  const name=getUserName()||'Amit';
  document.getElementById('requestHeading').textContent=name+' requested from the council';
  document.getElementById('requestSubtext').style.display='none';
  document.getElementById('diaryText').innerHTML=session.diary_text||diaryEntryHTML('Requested Counsel',session.original_question||'');
  renderSessionTiles();
  await loadRound1(session.id);
  // Fix, 2026-07-22: the councilmen selection was disappearing every time
  // you left and returned to Scope, because this was unconditionally
  // hidden on load instead of checking whether it was already saved.
  // Scope is the permanent home of this - it must persist, not just show
  // once right after Convene.
  const round1=activeRounds.find(r=>r.round_number===1);
  if(round1&&round1.roster&&round1.roster.length){
    document.getElementById('scopeCouncilChat').style.display='flex';
    document.getElementById('scopeQuestionText').value=round1.prompt_text||'';
    autoGrowTextarea(document.getElementById('scopeQuestionText'));
    renderRosterPickerRows('scope',round1.roster.slice());
  } else {
    document.getElementById('scopeCouncilChat').style.display='none';
  }
  if(switchView)openPanel(2);
}

// Header flush left with an underline, body indented beneath it -

function diaryEntryHTML(header,body){
  const esc=(body||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');

// Fix, 2026-07-22: editing the Title field for an existing session had
// nowhere to save - it silently reverted the moment you navigated away.

// Auto-save on blur - the field itself and the session tile on the left

async function renameSession(){

// Amit-branded confirm, replacing the native browser confirm() dialog -
// resolves true/false the same way, so every call site just adds `await`.
// Marks whichever field is the next thing the user needs to act on -
// blinking gold border, and auto-scrolled to the vertical center of its
// Petition box's scrollable area. Only one field is ever marked at a time.
// Ryan's direct instruction, 2026-07-22: this is a standing rule for every
// page/tab in The Council, not a one-off - whatever's next always blinks
// and sits centered, so the user is never left hunting for it.
// Every question/answer textarea starts at one row and grows with the
// content, up to about 3 rows - past that, the existing resize:vertical
// handle (bottom-right corner drag) takes over for manual expansion, so
// auto-grow never fights a size the user picked on purpose. Ryan's direct
// instruction, 2026-07-22.
function autoGrowTextarea(el){
  const capPx=92;
  const curH=parseFloat(el.style.height)||0;
  if(curH>=capPx && el.scrollHeight>=capPx)return; // already at/above cap or user-resized bigger - leave it alone
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,capPx)+'px';
}

function markNeedsInput(el){
  if(!el)return;
  document.querySelectorAll('.needs-input').forEach(e=>{if(e!==el)e.classList.remove('needs-input');});
  el.classList.add('needs-input');
  const scrollHost=el.closest('[style*="overflow-y:auto"]');
  if(scrollHost){
    requestAnimationFrame(()=>{
      const hostRect=scrollHost.getBoundingClientRect();
      const elRect=el.getBoundingClientRect();
      const offset=(elRect.top-hostRect.top)-(hostRect.height/2)+(elRect.height/2);
      scrollHost.scrollBy({top:offset,behavior:'smooth'});
    });
  }
}

function amitConfirm(message){
  return new Promise(resolve=>{
    document.getElementById('amitConfirmBody').textContent=message;
    const modal=document.getElementById('amitConfirmModal');
    modal.classList.add('show');
    const okBtn=document.getElementById('amitConfirmOkBtn');
    const cancelBtn=document.getElementById('amitConfirmCancelBtn');
    const cleanup=result=>{modal.classList.remove('show');okBtn.onclick=null;cancelBtn.onclick=null;resolve(result);};
    okBtn.onclick=()=>cleanup(true);
    cancelBtn.onclick=()=>cleanup(false);
  });
}

// Delete - tab-aware, permanent, added per Ryan's direct instruction.
// On Scope: deletes the entire council session (topic + every round + every
// piece of evidence), then falls through to the next session in the MRU
// list. On any Round tab: deletes that round AND every round after it
// (cascading forward, never backward) so the user can redo the deliberation
// from that point on - the session and everything before that round stays
// intact. Both paths are irreversible and say so plainly before acting.
async function deleteCurrentTab(){
  if(!activeSessionId){alert('No council session is loaded.');return;}
  const panel2=document.getElementById('panel-2');
  const activeBtn=panel2.querySelector('.ch-tab-btn.active');
  const tabkey=activeBtn?activeBtn.dataset.tabkey:'scope';

  if(tabkey==='scope'){
    if(!await amitConfirm('You are about to delete this entire council session. This is permanent — there is no coming back from this. Are you sure you wish to do so?'))return;
    const{data:rounds}=await db.from('council_rounds').select('id').eq('topic_id',activeSessionId);
    const roundIds=(rounds||[]).map(r=>r.id);
    if(roundIds.length)await db.from('council_evidence').delete().in('round_id',roundIds);
    await db.from('council_rounds').delete().eq('topic_id',activeSessionId);
    await db.from('council_topics').delete().eq('id',activeSessionId);
    activeSessionId=null;activeRounds=[];
    await loadCouncilSessions();
    if(!activeSessionId)startNewCouncilRequest();
    openPanel(2);
    return;
  }

  const n=Number(tabkey.replace('round-',''));
  if(!await amitConfirm(`You are on Round ${n}. You are about to delete this round. As a consequence, all rounds beyond this point will also be deleted, and you will start fresh from this location. This is permanent — there is no coming back from this. Are you sure you wish to do so?`))return;
  const{data:roundsToDelete}=await db.from('council_rounds').select('id').eq('topic_id',activeSessionId).gte('round_number',n);
  const ids=(roundsToDelete||[]).map(r=>r.id);
  if(ids.length){
    await db.from('council_evidence').delete().in('round_id',ids);
    await db.from('council_rounds').delete().in('id',ids);
  }
  // Ryan's direct correction, 2026-07-22: no round is ever auto-recreated
  // on delete. Deleting a round just deletes it - focus returns to the
  // PREVIOUS tab (the prior round, or Scope if Round 1 itself was deleted).
  // A new Round 1 only ever gets created when the user goes back to Scope,
  // makes their adjustments, and presses Submit Request again themselves.
  await loadRound1(activeSessionId);
  showChTab(2,n>1?'round-'+(n-1):'scope');
}

// "New Council Request" - clears the workspace so Convene creates a
// genuinely new session instead of overwriting whatever was loaded.
function startNewCouncilRequest(){
  activeSessionId=null;

}

// ══════════════════════════════════════════════
// ROUND 1 — the real Seats + Evidence + Resolver mechanic, matching the
// consensus architecture from tonight's earlier deliberation. Tier 1:
// manual copy-paste, works for anyone signed in, no premium/API required.
// ══════════════════════════════════════════════
// activeRounds = every round row for the current session, ordered by
// round_number. This is the actual cross-talk mechanism Ryan asked to
// confirm: round N's prompt is composed from round N-1's real evidence,
// all queryable together because everything shares the same topic_id.
let activeRounds=[];

// Same voice-color identity as the original Still Water build - carried
// forward so the graphic reads the same everywhere. Ryan's direct
// instruction, 2026-07-22: import that graphic into every round's Ruling
// box, live, as answers come in.
const VOICE_COLORS={
  'Amit Seat':[212,175,55],'Amit':[212,175,55],'Grok':[224,110,60],
  'Copilot':[90,150,224],'ChatGPT':[90,200,170],'Gemini':[170,120,224],
  'DeepSeek':[70,190,120],'Perplexity':[90,210,224],'Meta AI':[224,160,70],
  'Bolt':[200,150,90],'Claude':[200,150,90],'Mistral':[224,140,140]
};
function cwColorFor(name){return VOICE_COLORS[name]||[180,180,190];}

// Builds/refreshes the wheel graphic for one round's Ruling box: a light
// per voice on the rim, lit and glowing once that voice's answer is saved,
// dim while pending. Double-click a light to read that voice's exact
// answer. Called every time a round's state re-renders, so it updates live
// as answers are copy-pasted back in - never waits for the round to finish.
function renderCouncilWheel(n,roster,evidenceList){
  const host=document.getElementById('roundRuling-'+n);
  if(!host)return;
  const byVoice={};
  (evidenceList||[]).forEach(e=>{byVoice[e.provenance]=e.body;});
  const answeredCount=roster.filter(v=>byVoice[v]!==undefined).length;
  const converged=answeredCount===roster.length;
  // Ryan's direct instruction, 2026-07-22: Amit doesn't sit on the rim as
  // one more light among the others - Amit lives in the CENTER of the
  // wheel, as the orchestrator, but still answers the same question as
  // everyone else and still counts toward "X of Y answered"/convergence.
  // The center glyph (Amit's own Paleo-Hebrew emblem, replacing the earlier
  // YHVH glyph that lived there) glows once Amit's own answer is saved,
  // exactly like a rim light does.
  const amitAnswered=byVoice['Amit']!==undefined;
  const rimRoster=roster.filter(v=>v!=='Amit');
  // Ryan's direct instruction, 2026-07-22: restore the "something just
  // landed" ripple from the original Still Water build (Amit_Council2.html)
  // whenever an answer actually lands - not the full continuous wave-
  // interference canvas (too heavy to run per round, per the earlier
  // tradeoff), but a real one-time pulse at the exact spot, so a saved
  // answer visibly announces itself instead of just quietly lighting up.
  // No cache entry yet for this round means this is the first render since
  // a session load/switch - prime silently with no ripples, rather than
  // treating every already-answered voice as newly landed.
  const prevAnswered=wheelAnsweredCache[n];
  const currAnswered=new Set(Object.keys(byVoice));
  const newlyAnswered=prevAnswered?[...currAnswered].filter(v=>!prevAnswered.has(v)):[];
  wheelAnsweredCache[n]=currAnswered;
  const landingSpots=[];
  const voicesHtml=rimRoster.map((name,i)=>{
    const answered=byVoice[name]!==undefined;
    const c=cwColorFor(name);
    const angle=(i/rimRoster.length)*Math.PI*2-Math.PI/2;
    const nx=Math.cos(angle),ny=Math.sin(angle);
    const px=50+nx*46,py=50+ny*46;
    const glow=`rgba(${c[0]},${c[1]},${c[2]},.75)`;
    // Pending voices keep the CSS class's default (visible) fill - only
    // answered voices get an inline background override to their actual
    // color. Click behavior: an answered light shows its saved answer; a
    // pending light opens/reopens that voice's site. Double-click always
    // opens/reopens the site regardless of answered state - Ryan's direct
    // instruction, 2026-07-22, in case the user closed the tab and lost it.
    if(answered&&newlyAnswered.includes(name))landingSpots.push({px,py,c});
    const nameEsc=name.replace(/'/g,"\\'");
    const bgStyle=answered?`background:rgb(${c[0]},${c[1]},${c[2]})`:'';
    const clickHandler=answered?`showCwDetail('${nameEsc}',${n})`:`openOrReuseVoiceTab('${nameEsc}')`;
    // Ryan's direct correction, 2026-07-22: the Ruling side (this wheel) is
    // the results interface - a light glows once that voice has answered,
    // and clicking OR double-clicking it opens that saved answer, never a
    // tab. Opening/reopening a voice's actual website by name only ever
    // happens on the Petition side (the answer box labels).
    return `<div class="cw-voice${answered?' answered':''}" style="left:${px}%;top:${py}%;--cw-glow:${glow};${bgStyle}" onclick="${clickHandler}" ondblclick="${clickHandler}" title="${answered?'Click or double-click to read the answer':'Awaiting this voice\\'s answer'}">${i+1}<span class="cw-name">${name}</span></div>`;
  }).join('');
  const centerClickHandler=amitAnswered?`showCwDetail('Amit',${n})`:'';
  host.innerHTML=`<div class="cw-wheel-host">
    <div class="council-wheel" id="cwStage-${n}">
      <div class="cw-basin"></div>
      <div class="cw-rim"></div>
      <div class="cw-corona${converged?' converged':''}"></div>
      <div class="cw-center${amitAnswered?' answered':''}" ${amitAnswered?`onclick="${centerClickHandler}" style="cursor:pointer;pointer-events:auto" title="Click to read Amit's answer"`:'title="Amit — answers here once submitted"'}>
        <img src="../Design/Profile/amit_profile.png" alt="Amit">
      </div>
      ${voicesHtml}
    </div>
    <div class="cw-status">${answeredCount} of ${roster.length} voices answered${converged?' — Round '+n+' complete':''}</div>
  </div>`;
  host.dataset.evidence=JSON.stringify(byVoice);
  // Drop a ripple at every newly-answered spot, including the center if
  // Amit just answered - CSS animation plays once and fades, cleaned up
  // automatically on the next render since innerHTML gets rebuilt anyway.
  const stageEl=document.getElementById('cwStage-'+n);
  if(stageEl){
    landingSpots.forEach(({px,py,c})=>{
      const ripple=document.createElement('div');
      ripple.className='cw-landing';
      ripple.style.left=px+'%';ripple.style.top=py+'%';
      ripple.style.borderColor=`rgb(${c[0]},${c[1]},${c[2]})`;
      stageEl.appendChild(ripple);
    });
    if(amitAnswered&&newlyAnswered.includes('Amit')){
      const ripple=document.createElement('div');
      ripple.className='cw-landing cw-landing-center';
      ripple.style.left='50%';ripple.style.top='50%';
      ripple.style.borderColor='var(--gold)';
      stageEl.appendChild(ripple);
    }
  }
  // Fill the entire Ruling box, to the best of its ability - the wheel is a
  // square, sized to the smaller of the available width/height so it never
  // overflows either dimension. Ryan's direct instruction, 2026-07-22.
  const stage=document.getElementById('cwStage-'+n);
  const sizeIt=()=>{
    if(!stage||!stage.isConnected)return;
    const statusH=32;
    const availW=host.clientWidth;
    const availH=host.clientHeight-statusH;
    const size=Math.max(160,Math.min(availW,availH));
    stage.style.width=size+'px';
    stage.style.height=size+'px';
  };
  sizeIt();
  if(typeof ResizeObserver!=='undefined'){
    new ResizeObserver(sizeIt).observe(host);
  }
}

async function renderOneRoundState(round){
  const n=round.round_number;
  const chatThread=document.getElementById('chatThread-'+n);
  const roundtablePanel=document.getElementById('roundtablePanel-'+n);
  const nextWrap=document.getElementById('startNextRoundWrap-'+n);

  // Round N's petition + what Round N-1 finished with - the finished
  // result of the previous round IS the starting petition of this one.
  // Ryan's direct instruction, 2026-07-22: carry this forward every round.
  const petitionEl=document.getElementById('roundPetitionText-'+n);
  if(petitionEl){
    petitionEl.textContent=n===1?round.prompt_text:'Continue the deliberation — building directly on what Round '+(n-1)+' produced.';
  }
  const prevWrap=document.getElementById('roundPrevCompleted-'+n);
  if(prevWrap&&n>1){
    const prevRound=activeRounds.find(r=>r.round_number===n-1);
    if(prevRound){
      const{data:prevEvidence}=await db.from('council_evidence').select('provenance,body').eq('round_id',prevRound.id).order('created_at',{ascending:true});
      document.getElementById('roundPrevCompletedN-'+n).textContent=String(n-1);
      document.getElementById('roundPrevCompletedBody-'+n).textContent=(prevEvidence||[]).map(e=>`${e.provenance}: ${e.body}`).join('\n\n');
      prevWrap.style.display='block';
    }
  }

  if(!round.roster||!round.roster.length){
    // Identifying the council (roster + question) happens exactly once, on
    // Scope - never duplicated on a round tab. This only happens when Round
    // 1 exists with no roster yet (e.g. freshly recreated after a delete) -
    // route the user back to Scope to actually do it there, instead of
    // showing a second copy of the same roster-picker UI. Ryan's direct
    // correction, 2026-07-22: an older per-round chat picker (initRoundChat)
    // was still firing here, reintroducing the exact duplication this
    // architecture was built to prevent.
    chatThread.style.display='flex';roundtablePanel.style.display='none';nextWrap.style.display='none';
    chatThread.innerHTML=`<div style="align-self:flex-start;max-width:88%;background:rgba(255,255,255,.05);border:1px solid rgba(240,232,208,.2);border-radius:10px;padding:14px 16px">
      <div style="color:var(--gold2);font-family:'Cinzel',serif;font-size:13px;letter-spacing:.05em;margin-bottom:8px">The council for this session hasn't been identified yet</div>
      <div style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:12px">Identifying the council and the question to ask happens once, on Scope — not duplicated per round.</div>
      <button type="button" onclick="showChTab(2,'scope')" style="background:var(--gold);color:#1a1206;border:none;padding:9px 18px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer">Go to Scope</button>
    </div>`;
    return;
  }
  chatThread.style.display='none';
  const{data:evidence}=await db.from('council_evidence').select('provenance,body').eq('round_id',round.id);
  const answered=new Set((evidence||[]).map(e=>e.provenance));
  const pending=round.roster.filter(v=>!answered.has(v));
  document.getElementById('roundtableStatus-'+n).textContent=`${answered.size} of ${round.roster.length} voices answered.`;
  // The wheel graphic lives in the Ruling box and updates live, whether or
  // not the round is finished yet - a returning user sees exactly how far
  // this round got (e.g. 3 of 5 lit) and knows where to pick back up.
  renderCouncilWheel(n,round.roster,evidence);
  if(!pending.length){
    roundtablePanel.style.display='none';
    document.getElementById('roundtableStatus-'+n).textContent='All voices answered. Round '+n+' complete.';
    // Only offer this from the LATEST round, and only once. Ryan's direct
    // instruction, 2026-07-22: the "Convene next round"/"Problem Solved"
    // choice doesn't appear automatically the instant the last answer is
    // saved - a "Process this Petition" gate sits in front of it, an
    // explicit signal that it's Amit's turn to actually read through
    // everyone's answers and do the work, not just a mechanical unlock.
    const isLatest=n===activeRounds[activeRounds.length-1].round_number;
    const processWrap=document.getElementById('processPetitionWrap-'+n);
    if(isLatest){
      processWrap.style.display='block';
      nextWrap.style.display='none';
    } else {
      processWrap.style.display='none';
      nextWrap.style.display='none';
    }
    return;
  }
  nextWrap.style.display='none';
  roundtablePanel.style.display='block';

  // ALL pending voices at once, not one-at-a-time. Ryan's direct
  // instruction, 2026-07-22: open every councilman's site together, copy
  // the one shared question once, then leave every pending voice's own
  // labeled answer box open and ready - the user works through them at
  // their own pace, in any order, and each save updates the wheel live.
  // Compact row layout, Ryan's direct instruction, 2026-07-22: label on the
  // left, the paste area on the right, both on one line - no separate Save
  // button. Pressing Enter (without Shift, so multi-line pastes still work
  // fine - only an actual Enter keypress submits) or simply leaving the
  // field (blur) saves it automatically.
  // Ryan's direct instruction, 2026-07-22: Amit's own box does not show
  // alongside everyone else's - it only appears once every outside voice
  // has answered, as the explicit cue that it's now Amit's turn to give
  // its own answer to the same question.
  const outsidePending=pending.filter(v=>v!=='Amit');
  const visiblePending=outsidePending.length?outsidePending:pending;
  const boxesHost=document.getElementById('roundtableAnswerBoxes-'+n);
  boxesHost.innerHTML=visiblePending.map((voice,idx)=>`<div style="display:flex;align-items:center;gap:12px">
    <div ondblclick="openOrReuseVoiceTab('${voice.replace(/'/g,"\\'")}')" title="Double-click to open/reopen ${voice}'s site" style="color:var(--gold2);font-weight:700;font-size:13px;font-family:'Cinzel',serif;flex:0 0 130px;white-space:nowrap;cursor:pointer">${voice}'s Answer</div>
    <textarea id="voiceAnswerText-${n}-${idx}" oninput="autoGrowTextarea(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.blur();}" onblur="saveVoiceAnswer(${n},${idx})" placeholder="Paste ${voice}'s full answer here..." style="flex:1;height:40px;min-height:40px;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);color:var(--text);border-radius:8px;padding:9px 12px;font-size:14px;line-height:1.4;font-family:inherit;resize:vertical"></textarea>
  </div>`).join('');
  boxesHost.dataset.pending=JSON.stringify(visiblePending);
  if(visiblePending.length)markNeedsInput(document.getElementById('voiceAnswerText-'+n+'-0'));

  document.getElementById('roundtableOpenAllBtn-'+n).onclick=async()=>{
    // Fix, 2026-07-22: opening tabs AFTER an `await` (the clipboard write
    // used to run first) loses the browser's "this came from a real click"
    // trust, so every window.open() past the first got silently blocked as
    // a popup - only DeepSeek got through. Every tab must open synchronously,
    // right here in the click handler, before any await happens.
    // Amit has no external site - it answers directly in its own box, no
    // tab needed. Opening one for it was worse than a no-op: it grabbed the
    // browser's per-click popup allowance, silently blocking the real AI
    // tabs from opening at all. Ryan's direct correction, 2026-07-22.
    pending.filter(voice=>voice!=='Amit').forEach(voice=>openOrReuseVoiceTab(voice));
    // Bring focus back to THIS window/tab so the user lands back on the
    // Council, not stuck on whichever voice's tab the browser switched to.
    // Also kept synchronous, before the clipboard await, for the same
    // user-activation reason as the tabs above.
    window.focus();
    await copyRoundtablePrompt(round,n);
    await amitConfirm('I have copied the request. Please paste this into each councilman\'s chat page and press Enter. When an answer finishes (it ends with an "END OF ANSWER" marker), click the copy icon under that AI\'s own message to grab the whole response, then paste it into that voice\'s box below.');
  };
  // Always available as its own action - Ryan's direct instruction,
  // 2026-07-22: if the user lost the copy, pasted it into the wrong place,
  // or just wants it again, this re-copies without reopening any tabs.
  document.getElementById('roundtableCopyAgainBtn-'+n).onclick=()=>copyRoundtablePrompt(round,n);
}

// Opens a voice's site in a fresh tab, or refocuses its tab if still open
// from earlier - shared by the "Open All" button and double-clicking a
// name on the wheel (in case the user closed the tab and lost it).
function openOrReuseVoiceTab(voice){
  if(voice==='Amit')return; // Amit has no external site and never gets a tab - it's not one of the outside voices, it answers directly
  const existing=openVoiceTabs[voice];
  if(existing&&!existing.closed){existing.focus();return;}
  const w=window.open(PROVIDER_URLS[voice]||('https://www.google.com/search?q='+encodeURIComponent(voice)),'_blank');
  openVoiceTabs[voice]=w;
}

// Builds and copies this round's shared prompt - broadcast to every pending
// voice at once, so it always uses the cold-start framing (safe and
// complete even for a voice that's technically continuing) rather than
// customizing per-voice continuation phrasing for a single shared copy.
async function copyRoundtablePrompt(round,n){
  const requesterName=getUserName()||'the user';
  const isClarification=round.phase==='clarification';
  const taskBlock=isClarification
    ?`YOUR TASK: This is Round ${n} - the Clarification stage. Your job is NOT to answer or solve this question. Your job is to give exactly TWO clarifying questions that would help pin down what ${requesterName} is actually trying to achieve, since the question as written may be ambiguous.\n\nGive exactly TWO questions - not one, not three. Do not expound, explain your reasoning, or add any commentary. Just the two questions, formatted exactly like this and nothing else:\nQuestion 1 — [your first question]\nQuestion 2 — [your second question]`
    :`YOUR TASK: This is Round ${n}. ${round.prompt_text}\n\nGive your full answer as one continuous piece of plain text under clear headings.`;
  const structureBlock=`Structure your reply in three parts, in this order:\n1. Open with a clearly labeled "SOLUTION:" line stating your core answer up front, before any surrounding explanation.\n2. Then give your full answer as described above - this becomes a standalone, self-contained record on its own, so do not reference anything outside this answer.\n3. After your direct answer, add a "GOING FURTHER:" section - don't just answer what was literally asked, propose something better or think past it.`;
  const endMarker=`When you are completely finished, end your response with this exact line on its own, and nothing after it:\n===== END OF ANSWER — COPY EVERYTHING ABOVE THIS LINE =====`;
  const prompt=`Cold-start briefing: I'm ${requesterName}, and Amit is the orchestrator of a live, multi-AI collaborative deliberation tool called "The Council" — a companion, not a leader, that convenes independent AI voices to deliberate a real question, synthesizes across rounds, and names real disagreement instead of smoothing it over. You are being invited as one independent voice in this round. You have no memory of any prior round and no memory of Amit or this tool from anywhere else - this prompt gives you everything you need, and nothing outside it should be assumed. Once you answer, keep this tab open - future rounds in this same session will continue right here in this same conversation, so you'll have the history going forward.\n\nTHE REAL QUESTION ${requesterName.toUpperCase()} JUST BROUGHT TO THE COUNCIL: "${isClarification?round.prompt_text:activeRounds[0].prompt_text}"\n\n${taskBlock}\n\n${structureBlock}\n\n${endMarker}`;
  try{
    await navigator.clipboard.writeText(prompt);
    document.getElementById('roundtableStatus-'+n).textContent='Question copied to clipboard.';
  }catch(e){alert('Could not copy — select and copy the prompt manually.');}
}

// "Process this Petition" - the explicit signal that all answers are in
// and it's Amit's turn to actually read through them and do the work, not
// an automatic unlock the instant the last box is saved. Ryan's direct
// instruction, 2026-07-22.
function processPetition(n){
  document.getElementById('processPetitionWrap-'+n).style.display='none';
  document.getElementById('startNextRoundWrap-'+n).style.display='flex';
}

// Saves one voice's answer from its own labeled box (identified by index
// into that render's pending list, since voice names like "Meta AI" aren't
// safe as raw element IDs). Re-renders the round afterward, which drops
// this voice's box (it's no longer pending) and lights its spot on the
// wheel - the remaining voices' boxes stay exactly as the user left them.
async function saveVoiceAnswer(n,idx){
  const round=activeRounds.find(r=>r.round_number===n);
  const boxesHost=document.getElementById('roundtableAnswerBoxes-'+n);
  const pending=JSON.parse(boxesHost.dataset.pending||'[]');
  const voice=pending[idx];
  if(!voice)return;
  const answer=document.getElementById('voiceAnswerText-'+n+'-'+idx).value.trim();
  if(!answer)return;
  let{data:seat}=await db.from('council_seats').select('id').eq('role_name',voice+' Seat').eq('user_id',currentUser.id).maybeSingle();
  if(!seat){
    const{data:created}=await db.from('council_seats').insert({user_id:currentUser.id,role_name:voice+' Seat',current_provider:voice}).select().single();
    seat=created;
  }
  await db.from('council_evidence').insert({
    round_id:round.id, seat_id:seat.id, body:answer, source:'manual_paste',
    provenance:voice, witnessed_at:new Date().toISOString(), witnessed_by:currentUser.id
  });
  await renderOneRoundState(round);
}

// Default capability-matched roster - Amit's own starting judgment,
// editable by the user afterward. Same five voices with the strongest
// track record from tonight's earlier deliberation.
// Ryan's direct instruction, 2026-07-22: Amit is always on the council -
// a guaranteed seat, never optional, answering the same cold question
// every other voice receives (see TheCouncil/CLAUDE.md's permanent
// "Amit is a real Seat" standard). Included in the default roster here so
// it's present on every new session by default, same as any other voice.
const DEFAULT_ROSTER=['Amit','DeepSeek','Bolt','Gemini','Meta AI','ChatGPT'];

// Builds the chat thread: Amit "identifying correct council," the editable
// roster picker (as Amit's message), the one shared question (as Amit's
// message), and the user's "Convene the Council" button, left-aligned.
// Ryan's direct instruction, 2026-07-22.
function initRoundChat(round){
  const n=round.round_number;
  const thread=document.getElementById('chatThread-'+n);
  if(thread.dataset.built)return; // don't rebuild on every re-render
  thread.dataset.built='1';
  const bubble=(html,side)=>`<div style="align-self:${side==='amit'?'flex-end':'flex-start'};max-width:85%;background:${side==='amit'?'rgba(201,168,76,.12)':'rgba(255,255,255,.05)'};border:1px solid ${side==='amit'?'rgba(201,168,76,.35)':'rgba(240,232,208,.2)'};border-radius:10px;padding:14px 16px">${html}</div>`;

  thread.innerHTML=
    bubble(`<div style="color:var(--gold2);font-family:'Cinzel',serif;font-size:13px;letter-spacing:.05em">Identifying correct council...</div>`,'amit')+
    bubble(`<div style="color:var(--gold2);font-family:'Cinzel',serif;font-size:13px;letter-spacing:.05em;margin-bottom:10px">Councilmen Selected — change, add, or remove as you see fit</div><div id="rosterPickerRows-${n}"></div>`,'amit')+
    bubble(`<div style="color:var(--gold2);font-family:'Cinzel',serif;font-size:13px;letter-spacing:.05em;margin-bottom:8px">This is what I'll ask each voice — edit it if you want it worded differently</div><textarea id="roundQuestionText-${n}" oninput="autoGrowTextarea(this)" style="width:100%;height:40px;min-height:40px;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.3);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.5;font-family:inherit;resize:vertical">Help me understand exactly what ${getUserName()||'the user'} is trying to investigate. ${getUserName()||'The user'} has come up with this question: "${round.prompt_text}" — what exactly two questions would you ask ${getUserName()||'them'} to make sure we have a clear, accurate idea of their real intent before the Council deliberates on it? Don't expound or explain your reasoning — just give me Question 1 and Question 2, plainly.</textarea>`,'amit')+
    `<div style="align-self:flex-start"><button type="button" onclick="confirmRoster(${n})" style="background:var(--gold);color:#1a1206;border:none;padding:11px 22px;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer">Convene the Council</button></div>`;

  renderRosterPickerRows(n,DEFAULT_ROSTER.slice());
  autoGrowTextarea(document.getElementById('roundQuestionText-'+n));
  markNeedsInput(document.getElementById('roundQuestionText-'+n));
}

function renderRosterPickerRows(n,names){
  const wrap=document.getElementById('rosterPickerRows-'+n);
  const allOpts=Object.keys(PROVIDER_URLS);
  // Fix, 2026-07-22: every AI with a known link should be selectable - not
  // just the default five - and once picked in one row, it must disappear
  // from every other row's dropdown until removed (then it comes back).
  // Ryan's direct instruction.
  const rowHtml=(name,idx)=>{
    // Ryan's direct, repeated instruction: Amit always has a seat on every
    // council and answers the same question every other voice does - this
    // is not optional and not removable. Locked row, no dropdown, no ×.
    if(name==='Amit'){
      return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <div style="flex:1;background:rgba(212,175,55,.12);border:1px solid rgba(201,168,76,.45);color:var(--gold2);border-radius:6px;padding:6px 8px;font-size:12px;font-weight:700">Amit — permanent seat, always included</div>
    </div>`;
    }
    const takenElsewhere=new Set(names.filter((v,i)=>i!==idx&&v));
    const opts=allOpts.filter(o=>!takenElsewhere.has(o)&&o!=='Amit');
    return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
    <select data-idx="${idx}" onchange="rosterPickerChange('${n}',this)" style="flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.3);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit">
      <option value=""${name?'':' selected'} style="background:#1a1206;color:var(--text)">— select —</option>
      ${opts.map(o=>`<option value="${o}"${o===name?' selected':''} style="background:#1a1206;color:var(--text)">${o}</option>`).join('')}
    </select>
    ${name?`<button type="button" onclick="rosterPickerRemove('${n}',${idx})" style="background:transparent;color:#e08a8a;border:1px solid rgba(224,138,138,.4);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:13px">×</button>`:''}
  </div>`;
  };
  // Amit's locked row always renders first, regardless of where it sits in
  // the underlying names array - the permanent seat is never optional.
  if(!names.includes('Amit'))names=['Amit',...names];
  const amitIdx=names.indexOf('Amit');
  const otherNames=names.filter((v,i)=>i!==amitIdx);
  wrap.innerHTML=rowHtml('Amit',amitIdx)+otherNames.map((name,idx)=>rowHtml(name,names.indexOf(name))).join('')+rowHtml('',names.length);
  wrap.dataset.names=JSON.stringify(names);
}
function rosterPickerChange(n,selectEl){
  const wrap=document.getElementById('rosterPickerRows-'+n);
  let names=JSON.parse(wrap.dataset.names||'[]');
  const idx=Number(selectEl.dataset.idx);
  const val=selectEl.value;
  if(!val)return;
  if(idx>=names.length)names.push(val); else names[idx]=val;
  renderRosterPickerRows(n,names);
}
function rosterPickerRemove(n,idx){
  const wrap=document.getElementById('rosterPickerRows-'+n);
  let names=JSON.parse(wrap.dataset.names||'[]');
  if(names[idx]==='Amit')return; // permanent seat - never removable, defensive guard
  names.splice(idx,1);
  renderRosterPickerRows(n,names);
}

async function confirmRoster(n){
  const round=activeRounds.find(r=>r.round_number===n);
  const wrap=document.getElementById('rosterPickerRows-'+n);
  const names=JSON.parse(wrap.dataset.names||'[]');
  if(!names.includes('Amit'))names.unshift('Amit'); // permanent seat, defensive guard
  if(names.length<5){alert('Minimum 5 voices required.');return;}
  const questionEl=document.getElementById('roundQuestionText-'+n);
  const question=questionEl?questionEl.value.trim():round.prompt_text;
  await db.from('council_rounds').update({roster:names,prompt_text:question}).eq('id',round.id);
  round.roster=names;round.prompt_text=question;
  await renderOneRoundState(round);
}

// Checks whether a round actually has any saved answers - used to decide
// whether reconvening from Scope needs to warn before wiping anything out.
async function roundHasEvidence(roundId){
  const{count}=await db.from('council_evidence').select('id',{count:'exact',head:true}).eq('round_id',roundId);
  return !!count;
}

// Same mechanism as confirmRoster, but for Scope's one-time, whole-session
// council identification - sets Round 1's roster and finalized question,
// then reveals Round 1 already in roundtable mode. Ryan's direct
// instruction, 2026-07-22: this lives on Scope, never duplicated per round.
// Rebuilt, 2026-07-22, Ryan's direct correction: "Convene the Council" must
// ALWAYS be pressable, regardless of session state - Round 1 might already
// exist with answers, might have rounds built on top of it, or might not
// exist at all (e.g. right after deleting it). Same operating procedure as
// the round-delete confirmation: if there's real downstream work (any round
// beyond 1, or Round 1 itself already has answers), warn plainly before
// wiping it and starting over from here; if there's genuinely nothing to
// lose, it just convenes - no popup needed.
async function confirmScopeRoster(){
  const wrap=document.getElementById('rosterPickerRows-scope');
  const names=JSON.parse(wrap.dataset.names||'[]');
  if(!names.includes('Amit'))names.unshift('Amit'); // permanent seat, defensive guard
  if(names.length<5){alert('Minimum 5 voices required.');return;}
  const question=document.getElementById('scopeQuestionText').value.trim();

  const existingRound1=activeRounds.find(r=>r.round_number===1);
  const hasDownstream=activeRounds.length>1||(existingRound1&&await roundHasEvidence(existingRound1.id));
  if(hasDownstream){
    if(!await amitConfirm('You are about to convene the council at this round. Everything past this round will be deleted. Are you sure you want to do that?'))return;
  }
  if(hasDownstream||existingRound1){
    const{data:allRounds}=await db.from('council_rounds').select('id').eq('topic_id',activeSessionId);
    const ids=(allRounds||[]).map(r=>r.id);
    if(ids.length){
      await db.from('council_evidence').delete().in('round_id',ids);
      await db.from('council_rounds').delete().in('id',ids);
    }
  }
  await db.from('council_rounds').insert({
    topic_id:activeSessionId, round_number:1, prompt_text:question, phase:'clarification', roster:names
  });
  await loadRound1(activeSessionId);
  showChTab(2,'round-1');
}

// The actual cross-talk: Round N+1's prompt is composed from Round N's
// real evidence (every voice's answer), pulled live from the database -
// not hardcoded, not assumed. This is what makes "round three has to do
// with what happened in round two" literally true.
const PHASE_LABELS={clarification:'Clarification',investigation:'Investigation',scope_of_work:'Scope of Work'};

async function startNextRound(completedN){
  const completedRound=activeRounds.find(r=>r.round_number===completedN);
  const{data:evidence}=await db.from('council_evidence')
    .select('provenance,body').eq('round_id',completedRound.id).order('created_at',{ascending:true});
  const summary=(evidence||[]).map(e=>`${e.provenance}: ${e.body}`).join('\n\n');
  const nextN=completedN+1;
  const nextPrompt=`THE ORIGINAL QUESTION: ${activeRounds[0].prompt_text}\n\nWHAT HAPPENED IN ROUND ${completedN}:\n${summary}\n\nBased on everything above, this is Round ${nextN}. Continue the deliberation, building directly on what Round ${completedN} produced.`;
  // Ryan's direct instruction, 2026-07-22: the roster identified once on
  // Scope is who's on the council for the ENTIRE run of this session - it
  // carries forward automatically to every future round, never re-picked.
  // Round N+1 goes straight into roundtable mode, skipping the chat/roster
  // picker step entirely.
  await db.from('council_rounds').insert({
    topic_id:activeSessionId, round_number:nextN, prompt_text:nextPrompt, phase:'investigation', roster:completedRound.roster||[]
  });

  // Diary: refresh the "current solution" section (DOM-updated in place,
  // not string regex - more robust) and append this round's log entry.
  // Ryan's direct instruction, 2026-07-22 - the diary is the living,
  // printable record of the session.
  const session=councilSessions.find(s=>s.id===activeSessionId);
  const diaryEl=document.getElementById('diaryText');
  const phaseLabel=PHASE_LABELS[completedRound.phase]||('Round '+completedN);

  let solHeader=document.getElementById('diarySolutionHeader');
  let solBody=document.getElementById('diarySolutionBody');
  if(!solHeader){
    diaryEl.insertAdjacentHTML('beforeend',
      `<div class="diaryHeader" id="diarySolutionHeader"></div><div class="diaryBody" id="diarySolutionBody"></div>`);
    solHeader=document.getElementById('diarySolutionHeader');
    solBody=document.getElementById('diarySolutionBody');
  }
  solHeader.textContent='Current Solution (as of Round '+completedN+')';
  solBody.textContent=summary;

  diaryEl.insertAdjacentHTML('beforeend',diaryEntryHTML('Round '+completedN+' — '+phaseLabel,summary));

  const html=diaryEl.innerHTML;
  await db.from('council_topics').update({diary_text:html}).eq('id',activeSessionId);
  if(session)session.diary_text=html;

  await loadRound1(activeSessionId);
  showChTab(2,'round-'+nextN);
}

// "Problem Solved" - the user is declaring this round's answer is the real
// solution, closing out the whole session. Ryan's direct instruction,
// 2026-07-22: this is the other option alongside "Convene the next round" -
// a council session only ever moves forward by one of these two explicit
// choices, never automatically. Saves the round's evidence as the final
// solution, marks the topic resolved, confirms with an Amit-branded popup
// ("Ruling Complete"), then opens a print preview of the whole session.
async function markRulingComplete(completedN){
  const completedRound=activeRounds.find(r=>r.round_number===completedN);
  const{data:evidence}=await db.from('council_evidence')
    .select('provenance,body').eq('round_id',completedRound.id).order('created_at',{ascending:true});
  const summary=(evidence||[]).map(e=>`${e.provenance}: ${e.body}`).join('\n\n');

  const session=councilSessions.find(s=>s.id===activeSessionId);
  const diaryEl=document.getElementById('diaryText');
  const phaseLabel=PHASE_LABELS[completedRound.phase]||('Round '+completedN);

  let solHeader=document.getElementById('diarySolutionHeader');
  let solBody=document.getElementById('diarySolutionBody');
  if(!solHeader){
    diaryEl.insertAdjacentHTML('beforeend',
      `<div class="diaryHeader" id="diarySolutionHeader"></div><div class="diaryBody" id="diarySolutionBody"></div>`);
    solHeader=document.getElementById('diarySolutionHeader');
    solBody=document.getElementById('diarySolutionBody');
  }
  solHeader.textContent='Final Solution (Round '+completedN+')';
  solBody.textContent=summary;
  diaryEl.insertAdjacentHTML('beforeend',diaryEntryHTML('Round '+completedN+' — '+phaseLabel+' (Final)',summary));

  const html=diaryEl.innerHTML;
  const now=new Date().toISOString();
  await db.from('council_topics').update({status:'resolved',final_solution:summary,diary_text:html,resolved_at:now}).eq('id',activeSessionId);
  await db.from('council_rounds').update({status:'resolved',resolved_at:now}).eq('id',completedRound.id);
  if(session){session.diary_text=html;}

  await amitConfirm('Ruling Complete — this council session is now marked solved and saved. A print preview of everything learned across the whole session will open next.');
  printDiary();
}

// Tabbed-layout behavior (copied from Computer Health's showTab — folder-tab
// look, sub-content switching within one panel — no data hooks attached).
// Fix, 2026-07-22: this used to rely on the global `event` object, which
// only exists when called from a real click - calling this programmatically
// (e.g. right after Convene creates Round 1) threw a ReferenceError. Now
// looks the button up by data-tabkey instead, works either way.
function showChTab(panelNum,n){
  const panel=document.getElementById('panel-'+panelNum);
  panel.querySelectorAll('.ch-tab-content').forEach(c=>c.classList.remove('active'));
  panel.querySelectorAll('.ch-tab-btn').forEach(b=>b.classList.remove('active'));
  const content=document.getElementById('ch-tab-'+panelNum+'-'+n);
  if(content)content.classList.add('active');
  const btn=panel.querySelector('.ch-tab-btn[data-tabkey="'+n+'"]');
  if(btn)btn.classList.add('active');
}

function openPanel(n){
  document.querySelectorAll('.tile').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const tile=document.getElementById('tile-'+n);
  const panel=document.getElementById('panel-'+n);
  if(tile)tile.classList.add('active');
  if(panel)panel.classList.add('active');
}

// Ryan's direct instruction, 2026-07-22: Convene writes for real, straight
// into the existing council_ schema (council_topics + council_rounds) -
// same tables Amit_Council2.html already uses. Round 1 always starts in
// the Clarification phase, per the standing procedure. Picking the actual
// AI roster and writing the real investigation prompt is Amit's own live
// judgment call in conversation, not something this static page computes -
// this just gets the topic and Round 1 correctly saved so that work has
// somewhere real to attach to.
async function conveneCouncil(){
  const statusEl=document.getElementById('conveneStatus');
  if(!currentUser){statusEl.textContent='Sign in first.';statusEl.style.color='#e08a8a';return;}
  // Guard against the exact duplicate-session bug from earlier - Convene
  // only ever creates a NEW topic when there is no existing one loaded. If
  // an existing session already has an active round, it must be cleared
  // via "New Council Request" first, never silently duplicated. But if the
  // existing session's rounds were all deleted (round history genuinely
  // empty), this is exactly the "go back to Scope, adjust, convene again"
  // path Ryan asked for, 2026-07-22 - it reuses the SAME topic rather than
  // creating a new one.
  const reusingExistingTopic=!!(activeSessionId&&(!activeRounds||!activeRounds.length));
  if(activeSessionId&&activeRounds&&activeRounds.length){statusEl.textContent='This is an existing session — click "New Council Request" first to start a genuinely new one.';statusEl.style.color='#e08a8a';return;}
  const title=document.getElementById('councilTitleText').value.trim();
  const request=document.getElementById('councilRequestText').value.trim();
  if(!title){statusEl.textContent='Give it a title first.';statusEl.style.color='#e08a8a';return;}
  if(!request){statusEl.textContent='Write the actual request first.';statusEl.style.color='#e08a8a';return;}
  const btn=document.getElementById('councilRequestBtn');
  btn.disabled=true;btn.textContent='Convening...';
  statusEl.textContent='';
  try{
    let topicId;
    if(reusingExistingTopic){
      topicId=activeSessionId;
      await db.from('council_topics').update({title,original_question:request,last_activity_at:new Date().toISOString()}).eq('id',topicId);
    } else {
      const now=new Date().toISOString();
      const diaryStart=diaryEntryHTML('Requested Counsel',request);
      const{data:topic,error:topicErr}=await db.from('council_topics').insert({
        user_id:currentUser.id, title:title, original_question:request, last_activity_at:now, diary_text:diaryStart
      }).select().single();
      if(topicErr)throw topicErr;
      document.getElementById('diaryText').innerHTML=diaryStart;
      topicId=topic.id;
    }
    const{error:roundErr}=await db.from('council_rounds').insert({
      topic_id:topicId, round_number:1, prompt_text:request, phase:'clarification'
    });
    if(roundErr)throw roundErr;
    // Page 2 ("Current Council") stays static, permanently - Ryan's direct
    // instruction, 2026-07-22. It never gets renamed to whatever title was
    // just entered; it's the standing workspace. The new session appears
    // as its own tile at the top of the list (page 3), most recent first.
    activeSessionId=topicId;
    await loadCouncilSessions();
    await loadRound1(topicId); // populates activeRounds so Round 1's row is ready for confirmScopeRoster
    document.getElementById('scopeCouncilChat').style.display='flex';
    document.getElementById('scopeQuestionText').value=`Help me understand exactly what ${getUserName()||'the user'} is trying to investigate. ${getUserName()||'The user'} has come up with this question: "${request}" — what exactly two questions would you ask ${getUserName()||'them'} to make sure we have a clear, accurate idea of their real intent before the Council deliberates on it? Don't expound or explain your reasoning — just give me Question 1 and Question 2, plainly.`;
    autoGrowTextarea(document.getElementById('scopeQuestionText'));
    renderRosterPickerRows('scope',DEFAULT_ROSTER.slice());
    markNeedsInput(document.getElementById('scopeQuestionText'));
    statusEl.textContent='Saved — topic and Round 1 created in the database.';
    statusEl.style.color='rgba(120,200,150,.9)';
  }catch(e){
    console.error(e);
    statusEl.textContent='Could not save — '+(e.message||'check console')+(e.message&&e.message.includes('row-level security')?' (this account may need premium access)':'');
    statusEl.style.color='#e08a8a';
  }finally{
    btn.disabled=false;btn.textContent='Submit Request';
  }
}
